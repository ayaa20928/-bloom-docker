version: '3.9'
services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bloom_frontend
    ports:
      - '3000:80'
    volumes:
      - ./frontend/src:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - bloom_net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bloom_backend
    ports:
      - '5000:5000'
    volumes:
      - ./backend/src:/app/src
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=bloom_db
      - DB_USER=bloom_user
      - DB_PASSWORD=bloom_pass_2024
    depends_on:
      - database
    networks:
      - bloom_net
    restart: unless-stopped

  database:
    build:
      context: ./data
      dockerfile: Dockerfile
    container_name: bloom_database
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=bloom_db
      - POSTGRES_USER=bloom_user
      - POSTGRES_PASSWORD=bloom_pass_2024
    volumes:
      - bloom_db_data:/var/lib/postgresql/data
    networks:
      - bloom_net
    restart: unless-stopped

networks:
  bloom_net:
    driver: bridge

volumes:
  bloom_db_data:
    driver: local
