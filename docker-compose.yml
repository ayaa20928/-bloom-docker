version: '3.9'
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bloom_frontend
    ports:
      - '3000:80'
    volumes:
      - ./frontend/src:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - bloom_net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bloom_backend
    ports:
      - '5000:5000'
    volumes:
      - ./backend/src:/app/src
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=database
      - DB_PORT=3306
      - DB_NAME=bloom_db
      - DB_USER=bloom_user
      - DB_PASSWORD=bloom_pass_2024
      - JWT_SECRET=bloom_secret_key
    depends_on:
      database:
        condition: service_healthy
    networks:
      - bloom_net
    restart: unless-stopped

  database:
    build:
      context: ./data
      dockerfile: Dockerfile
    container_name: bloom_database
    ports:
      - '3306:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=root_bloom_2024
      - MYSQL_DATABASE=bloom_db
      - MYSQL_USER=bloom_user
      - MYSQL_PASSWORD=bloom_pass_2024
    volumes:
      - bloom_db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bloom_net
    restart: unless-stopped

networks:
  bloom_net:
    driver: bridge

volumes:
  bloom_db_data:
    driver: local
